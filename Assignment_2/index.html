<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">

                <h1 class="text-center mb-4 text-primary">Smart To-Do Manager</h1>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form class="row g-3 align-items-end">
                            <div class="col-12 col-md-4">
                                <label for="task" class="form-label fw-bold">Task</label>
                                <input type="text" class="form-control" id="task" placeholder="Enter New Task">
                            </div>
                            
                            <div class="col-12 col-md-3">
                                <label for="taskDate" class="form-label fw-bold">Deadline</label>
                                <input type="date" class="form-control" id="taskDate">
                            </div>
                            
                            <div class="col-12 col-md-3">
                                <label for="priority" class="form-label fw-bold">Priority</label>
                                <select class="form-select" id="priority">
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            
                            <div class="col-12 col-md-2 d-grid">
                                <button type="button" class="btn btn-primary" id="addTaskBtn">Add</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-3 gap-3">
                    
                    <div class="btn-group" role="group" aria-label="Filter Tasks">
                        <button type="button" class="btn btn-outline-primary active">All</button>
                        <button type="button" class="btn btn-outline-primary">Completed</button>
                        <button type="button" class="btn btn-outline-primary">Pending</button>
                    </div>

                    <div class="d-flex align-items-center gap-2">
                        <label for="sortTasks" class="form-label mb-0 fw-bold text-nowrap">Sort by:</label>
                        <select class="form-select form-select-sm" id="sortTasks">
                            <option value="Priority">Priority</option>
                            <option value="Deadline">Deadline</option>
                        </select>
                    </div>

                </div>

                <div class="d-flex justify-content-between bg-white p-3 rounded shadow-sm mb-4 border">
                    <span class="fw-bold">Total: <span id="TotalTasks" class="badge bg-secondary">2</span></span>
                    <span class="fw-bold text-success">Completed: <span id="CompletedTasks" class="badge bg-success">1</span></span>
                    <span class="fw-bold text-warning">Pending: <span id="PendingTasks" class="badge bg-warning text-dark">1</span></span>
                </div>

                <div id="TaskList" class="d-flex flex-column gap-3">
                    
                    
                </div>
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
